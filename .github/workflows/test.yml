name: tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# Run only the pure-numpy/scipy tests (alignment + rasterize). GPU-
# dependent code (model loading, attention extraction) is NOT exercised
# in CI — that would require A40-class hardware.
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          # Only the deps the unit tests actually need — no torch,
          # no transformers, no bitsandbytes. Keeps CI fast (~30s).
          pip install pytest numpy pandas scipy scikit-learn

      - name: Run tests
        run: python -m pytest tests/ -v
